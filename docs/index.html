<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REI Coaching GSC Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f3f4f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
    }

    .card h2 {
      margin: 0;
      font-size: 14px;
      color: #9ca3af;
    }

    .card .value {
      margin-top: 10px;
      font-size: 32px;
      font-weight: bold;
    }

    .section {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #374151;
    }

    th {
      color: #9ca3af;
      font-size: 13px;
    }

    tr:hover {
      background: #374151;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h1>REI Coaching GSC Dashboard</h1>

<div class="cards">
  <div class="card">
    <h2>Total Clicks</h2>
    <div class="value" id="clicks">-</div>
  </div>

  <div class="card">
    <h2>Total Impressions</h2>
    <div class="value" id="impressions">-</div>
  </div>

  <div class="card">
    <h2>Average Position</h2>
    <div class="value" id="position">-</div>
  </div>

  <div class="card">
    <h2>CTR</h2>
    <div class="value" id="ctr">-</div>
  </div>
</div>

<div class="section">
  <h2>Daily Impressions</h2>
  <canvas id="dailyChart"></canvas>
</div>

<div class="section">
  <h2>Top Pages</h2>

  <table id="pagesTable">
    <thead>
      <tr>
        <th>Page</th>
        <th>Clicks</th>
        <th>Impressions</th>
        <th>Position</th>
      </tr>
    </thead>

    <tbody></tbody>
  </table>
</div>

<div class="section">
  <h2>Top Queries</h2>

  <table id="queriesTable">
    <thead>
      <tr>
        <th>Query</th>
        <th>Clicks</th>
        <th>Impressions</th>
        <th>Position</th>
      </tr>
    </thead>

    <tbody></tbody>
  </table>
</div>

<script>

async function loadData() {

  const summary = await fetch('./data/summary.json').then(r => r.json());
  const pages = await fetch('./data/pages.json').then(r => r.json());
  const queries = await fetch('./data/queries.json').then(r => r.json());
  const daily = await fetch('./data/daily.json').then(r => r.json());

  document.getElementById('clicks').innerText = summary.clicks;
  document.getElementById('impressions').innerText = summary.impressions;
  document.getElementById('position').innerText = Number(summary.position).toFixed(1);
  document.getElementById('ctr').innerText = (summary.ctr * 100).toFixed(2) + '%';

  const pagesBody = document.querySelector('#pagesTable tbody');

  pages
    .sort((a,b) => b.impressions - a.impressions)
    .slice(0,20)
    .forEach(p => {

      const row = `
        <tr>
          <td><a href="${p.page}" target="_blank">${p.page}</a></td>
          <td>${p.clicks}</td>
          <td>${p.impressions}</td>
          <td>${Number(p.position).toFixed(1)}</td>
        </tr>
      `;

      pagesBody.innerHTML += row;
    });

  const queriesBody = document.querySelector('#queriesTable tbody');

  queries
    .sort((a,b) => b.impressions - a.impressions)
    .slice(0,20)
    .forEach(q => {

      const row = `
        <tr>
          <td>${q.query}</td>
          <td>${q.clicks}</td>
          <td>${q.impressions}</td>
          <td>${Number(q.position).toFixed(1)}</td>
        </tr>
      `;

      queriesBody.innerHTML += row;
    });

  const ctx = document.getElementById('dailyChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: daily.map(d => d.date),
      datasets: [{
        label: 'Impressions',
        data: daily.map(d => d.impressions),
      }]
    }
  });

}

loadData();

</script>

</body>
</html>
